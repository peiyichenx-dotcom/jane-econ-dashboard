<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="з¶“жҝҹе„ҖиЎЁжқҝ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Jane з¶“жҝҹеұҖеӢўе„ҖиЎЁжқҝ</title>
<style>
:root{
  --bg:#0b0f1a; --card:#131a2b; --card2:#1a2338; --line:#232e4a;
  --tx:#e8ecf6; --tx2:#8b96b3; --tx3:#6b7793;
  --good:#34d399; --info:#60a5fa; --warn:#fbbf24; --bad:#f87171;
  --green:#10b981; --blue:#3b82f6; --orange:#f59e0b; --red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
  font-size:15px;line-height:1.5;padding:env(safe-area-inset-top) 0 40px}
.wrap{max-width:560px;margin:0 auto;padding:14px 14px 0}
header{display:flex;justify-content:space-between;align-items:baseline;padding:6px 2px 12px}
header h1{font-size:17px;font-weight:700;letter-spacing:.5px}
header .upd{font-size:11px;color:var(--tx3)}
header .hr{display:flex;align-items:center;gap:8px}
#refbtn{background:var(--card2);border:1px solid var(--line);color:var(--tx2);border-radius:8px;
  font-size:11px;padding:4px 10px;cursor:pointer;white-space:nowrap}
#refbtn:disabled{opacity:.6}
#refbtn.busy{color:var(--warn);border-color:#6b4e1a}
.stale-banner{background:#3a2b12;color:#fbbf24;border:1px solid #6b4e1a;border-radius:10px;
  padding:10px 12px;font-size:13px;font-weight:600;margin-bottom:12px}

/* зёҪи©• */
.hero{border-radius:18px;padding:18px 16px 16px;margin-bottom:14px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line)}
.hero::before{content:"";position:absolute;inset:0;opacity:.16;background:
  radial-gradient(circle at 85% 15%,var(--hero-c,#3b82f6),transparent 60%)}
.hero .lv{display:flex;align-items:center;gap:12px;position:relative}
.hero .badge{font-size:22px;font-weight:800;letter-spacing:1px;color:var(--hero-c,#3b82f6)}
.hero .score{margin-left:auto;text-align:right}
.hero .score b{font-size:30px;font-weight:800;color:var(--hero-c)}
.hero .score span{font-size:11px;color:var(--tx3);display:block;margin-top:-4px}
.gaugewrap{position:relative;margin:12px 0 2px}
.gaugebar{height:8px;border-radius:4px;position:relative;background:
  linear-gradient(90deg,#ef4444 0 25%,#f59e0b 25% 45%,#3b82f6 45% 68%,#10b981 68% 100%);opacity:.9}
.gaugebar i{position:absolute;top:-4px;width:4px;height:16px;background:#fff;border-radius:2px;
  box-shadow:0 0 6px rgba(255,255,255,.8);transform:translateX(-2px)}
.gaugebar b{position:absolute;top:-2px;width:2px;height:12px;background:rgba(255,255,255,.5);transform:translateX(-1px)}
.gscale{display:flex;font-size:9.5px;color:var(--tx3);margin:4px 0 8px;position:relative;height:12px}
.gscale span{position:absolute;transform:translateX(-50%)}
.hero p{font-size:13px;color:var(--tx2);position:relative}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;position:relative}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid}
.chip.cr{color:var(--bad);border-color:#5b2530;background:#2a1520}
.chip.op{color:var(--good);border-color:#1d4a3a;background:#0f2a20}
.chip.liq{color:var(--info);border-color:#274169;background:#131f38}

/* еҚҖеЎҠ */
h2.sec{font-size:14px;font-weight:700;margin:20px 2px 3px;display:flex;align-items:center;gap:8px}
h2.sec::before{content:"";width:4px;height:15px;border-radius:2px;background:var(--info)}
.secnote{font-size:11px;color:var(--tx3);margin:0 2px 9px 14px}
.watchrow{display:flex;flex-wrap:wrap;gap:5px;margin:0 2px 10px 14px}
.watch{font-size:10.5px;padding:2px 8px;border-radius:12px;border:1px solid var(--line);color:var(--tx3)}
.watch.on{color:var(--bad);border-color:#5b2530;background:#2a1520;font-weight:700}

/* иіҮйҮ‘жөҒеҗ‘ */
.flows{display:flex;flex-direction:column;gap:8px}
.flow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;
  display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--tx2)}
.flow .ic{font-size:16px;line-height:1.3;flex-shrink:0}

/* жҢҮжЁҷеҚЎ */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden}
.row{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;user-select:none}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.good{background:var(--good);box-shadow:0 0 8px rgba(52,211,153,.5)}
.dot.info{background:var(--info)}
.dot.warn{background:var(--warn);box-shadow:0 0 8px rgba(251,191,36,.4)}
.dot.bad{background:var(--bad);box-shadow:0 0 8px rgba(248,113,113,.55)}
.row .nm{flex:1;min-width:0}
.row .nm b{font-size:13.5px;font-weight:600;display:block}
.row .nm span{font-size:11px;color:var(--tx2);display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;line-height:1.35}
.row .val{text-align:right;flex-shrink:0}
.row .val b{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.row .val span{font-size:10px;color:var(--tx3);display:block}
.row svg{flex-shrink:0;opacity:.92}
.chev{color:var(--tx3);font-size:10px;flex-shrink:0;transition:transform .18s;margin-left:-2px}
.card.open .chev{transform:rotate(180deg)}
.oppflag{font-size:10px;color:#0b0f1a;background:var(--good);border-radius:4px;padding:1px 5px;
  font-weight:700;margin-left:5px;vertical-align:2px}
.stale-tag{font-size:10px;color:var(--warn);margin-left:5px}
.detail{display:none;padding:2px 14px 13px;border-top:1px dashed var(--line);font-size:12.5px;color:var(--tx2)}
.card.open .detail{display:block}
.detail .q{padding:9px 0 5px}
.detail .meta{font-size:11.5px;color:var(--tx3);margin-top:6px}
.detail .extra{color:var(--tx2);font-size:12px;margin-top:4px}

/* иіҮз”ўзҹ©йҷЈ */
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 12px}
.tile .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.tile .hd b{font-size:13.5px}
.tile .st{font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:6px}
.st.й ҶйўЁ{color:var(--good);background:#0f2a20}
.st.йҖҶйўЁ{color:var(--bad);background:#2a1520}
.st.дёӯжҖ§{color:var(--info);background:#131f38}
.st.еҪҲи—ҘжҷӮеҲ»{color:#0b0f1a;background:var(--good)}
.st.еёёеӮҷ{color:var(--tx2);background:var(--card2)}
.tile p{font-size:11px;color:var(--tx3);line-height:1.45}

.legend{font-size:10.5px;color:var(--tx3);margin:8px 2px 0;line-height:1.6}
footer{margin-top:26px;padding:0 4px;font-size:11px;color:var(--tx3);line-height:1.7}
.loading{text-align:center;padding:60px 20px;color:var(--tx2)}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loading">ијүе…ҘиіҮж–ҷдёӯвҖҰ</div></div>
<script>
const FLOW_IC={usd:"рҹ’ө",risk:"рҹҡҖ",safe:"рҹӣЎпёҸ",flat:"вҡ–пёҸ"};
const HERO_C={green:"var(--green)",blue:"var(--blue)",orange:"var(--orange)",red:"var(--red)"};
const SIG_C={good:"#34d399",info:"#60a5fa",warn:"#fbbf24",bad:"#f87171"};

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

function sparkline(vals,sig,refs){
  if(!vals||vals.length<2) return "";
  const w=64,h=26;
  let mn=Math.min(...vals),mx=Math.max(...vals);
  // й–ҖжӘ»з·ҡиӢҘеңЁж•ёж“ҡйҷ„иҝ‘(зҜ„еңҚ1.5еҖҚе…§)пјҢжҠҠе®ғзҙҚе…ҘеҲ»еәҰ
  (refs||[]).forEach(r=>{const pad=(mx-mn)||1;if(r>mn-pad*1.5&&r<mx+pad*1.5){mn=Math.min(mn,r);mx=Math.max(mx,r);}});
  const rg=(mx-mn)||1;
  const y=v=>(h-2-(v-mn)/rg*(h-4));
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const col=SIG_C[sig]||"#60a5fa";
  let reflines=(refs||[]).filter(r=>r>=mn&&r<=mx).map(r=>
    `<line x1="0" y1="${y(r).toFixed(1)}" x2="${w}" y2="${y(r).toFixed(1)}" stroke="#8b96b3" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.55"/>`).join("");
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${reflines}<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linejoin="round"/></svg>`;
}

function bandbar(band,value){
  // й–ҖжӘ»еһӢжҢҮжЁҷпјҡиүІеё¶пјӢзҸҫеҖјжҢҮйҮқпјҲжҜ”жҠҳз·ҡжӣҙиғҪзңӢеҮәгҖҢйӣўй–ҖжӘ»еӨҡйҒ гҖҚпјү
  if(!band||value===null||value===undefined) return "";
  const w=64,h=26,{min,max,zones}=band;
  const x=v=>((Math.min(Math.max(v,min),max)-min)/(max-min)*w);
  const rects=zones.map(z=>
    `<rect x="${x(z[0]).toFixed(1)}" y="9" width="${(x(z[1])-x(z[0])).toFixed(1)}" height="8" rx="1.5" fill="${SIG_C[z[2]]}" opacity="0.4"/>`).join("");
  const vx=x(Number(value)).toFixed(1);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${rects}
    <line x1="${vx}" y1="4" x2="${vx}" y2="22" stroke="#fff" stroke-width="2"/>
    <polygon points="${vx-3},2 ${Number(vx)+3},2 ${vx},7" fill="#fff"/></svg>`;
}

function fmtVal(i){
  if(i.value===null||i.value===undefined) return "вҖ”";
  let v=Number(i.value);
  let s=v.toLocaleString("en-US",{minimumFractionDigits:i.decimals,maximumFractionDigits:i.decimals});
  if(i.unit==="$") return "$"+s;
  return s+(i.unit&&i.unit!=="$"?" "+i.unit:"");
}

function staleHours(d){
  try{
    const t=Date.parse(d.updated_utc.replace(" UTC","Z").replace(" ","T"));
    return (Date.now()-t)/36e5;
  }catch(e){return 0}
}

function render(d){
  CUR_UPDATED=d.updated_utc;
  const c=d.composite;
  let html=`<header><h1>рҹҢҚ з¶“жҝҹеұҖеӢўе„ҖиЎЁжқҝ</h1><div class="hr">
    <div class="upd">жӣҙж–° ${esc(d.updated_tpe)} еҸ°еҢ—</div>
    <button id="refbtn" onclick="manualUpdate()">рҹ”„ з«ӢеҚіжӣҙж–°</button></div></header>`;
  const age=staleHours(d);
  if(age>26) html+=`<div class="stale-banner">вҡ пёҸ иіҮж–ҷе·І ${Math.floor(age)} е°ҸжҷӮжңӘжӣҙж–°пјҲжңҖеҫҢпјҡ${esc(d.updated_tpe)}пјүвҖ”вҖ”д»ҘдёӢж•ёеӯ—еҸҜиғҪйҒҺжңҹпјҢеҲӨж–·еүҚи«Ӣз•ҷж„ҸгҖӮ</div>`;
  if(d.mock) html+=`<div class="stale-banner">вҡ пёҸ зӣ®еүҚйЎҜзӨәжё¬и©ҰиіҮж–ҷпјҲmockпјү</div>`;
  else if(d.errors&&d.errors.length) html+=`<div class="stale-banner">вҡ пёҸ ${d.errors.length} еҖӢдҫҶжәҗд»Ҡж—ҘжҠ“еҸ–еӨұж•—пјҢзӣёй—ңжҢҮжЁҷжІҝз”ЁеүҚеҖј</div>`;

  // зёҪи©•
  html+=`<div class="hero" style="--hero-c:${HERO_C[c.color]||"var(--blue)"}">
    <div class="lv"><span class="badge">${esc(c.level)}</span>
      <div class="score"><b>${c.score}</b><span>/100 з¶ңеҗҲеҲҶ</span></div></div>
    <div class="gaugewrap">
      <div class="gaugebar"><b style="left:25%"></b><b style="left:45%"></b><b style="left:68%"></b><i style="left:${c.score}%"></i></div>
      <div class="gscale"><span style="left:12%">еҚұж©ҹ</span><span style="left:25%">25</span><span style="left:35%">йҳІзҰҰ</span><span style="left:45%">45</span><span style="left:56%">дёӯжҖ§</span><span style="left:68%">68</span><span style="left:84%">йҖІж”»</span></div>
    </div>
    <p>${esc(c.summary)}</p>
    <div class="chips">
      <span class="chip liq">жөҒеӢ•жҖ§й–Ӣй—ңпјҡ${c.liq_on?"ON йҖІж”»":"OFF йҳІзҰҰ"}</span>
      <span class="chip ${c.crisis_flags.length?"cr":"liq"}">еҚұж©ҹиӯҰиЁҠ ${c.crisis_flags.length}/${c.crisis_total}</span>
      ${c.opportunity_flags.map(f=>`<span class="chip op">рҹ’° ${esc(f)}</span>`).join("")}
    </div></div>`;

  // иіҮйҮ‘жөҒеҗ‘
  html+=`<h2 class="sec">иіҮйҮ‘жөҒеҗ‘</h2><div class="secnote">йҢўжӯЈеңЁеҫҖе“ӘиЈЎз§»еӢ•вҖ”вҖ”йҮҚй»һжҳҜе…ЁзҗғжөҒеӢ•жҖ§еҫһе“ӘиЈЎз§»еӢ•еҲ°е“ӘиЈЎ</div><div class="flows">`;
  html+=d.flows.map(f=>`<div class="flow"><span class="ic">${FLOW_IC[f.dir]||"вҡ–пёҸ"}</span><span>${esc(f.text)}</span></div>`).join("");
  html+=`</div>`;

  // иіҮз”ўеҪұйҹҝзҹ©йҷЈ
  html+=`<h2 class="sec">иіҮз”ўеҪұйҹҝзҹ©йҷЈ</h2><div class="secnote">зӣ®еүҚз’°еўғе°Қеҗ„иіҮз”ўжҳҜй ҶйўЁйӮ„жҳҜйҖҶйўЁ</div><div class="matrix">`;
  html+=d.assets.map(a=>`<div class="tile"><div class="hd"><b>${esc(a.name)}</b><span class="st ${esc(a.stance)}">${esc(a.stance)}</span></div><p>${esc(a.note)}</p></div>`).join("");
  html+=`</div>`;

  // жҢҮжЁҷеҲҶеҚҖ
  for(const g of d.groups){
    const items=d.indicators.filter(i=>i.group===g.id);
    if(!items.length) continue;
    html+=`<h2 class="sec">${esc(g.title)}</h2><div class="secnote">${esc(g.note)}</div>`;
    if(g.id==="crisis"&&c.watchlist){
      html+=`<div class="watchrow">${c.watchlist.map(w=>
        `<span class="watch${w.fired?" on":""}">${w.fired?"вҡ ":"вң“"} ${esc(w.name)}</span>`).join("")}</div>`;
    }
    for(const i of items){
      const viz = i.band ? bandbar(i.band,i.value) : sparkline(i.spark,i.signal,i.refs);
      html+=`<div class="card" id="c-${i.id}">
        <div class="row" onclick="this.parentNode.classList.toggle('open')">
          <span class="dot ${i.signal}"></span>
          <div class="nm"><b>${esc(i.label)}${i.opp?'<span class="oppflag">иІ·й»һ</span>':""}${i.stale?'<span class="stale-tag">еүҚеҖј</span>':""}</b>
            <span>${esc(i.signal_text)}</span></div>
          ${viz}
          <div class="val"><b>${fmtVal(i)}</b><span>${i.change?("йҖұ "+esc(i.change)):""}</span></div>
          <span class="chev">в–ј</span>
        </div>
        <div class="detail">
          <div class="q">${esc(i.interp)}</div>
          ${i.extra?`<div class="extra">${esc(i.extra)}</div>`:""}
          <div class="meta">еҮәиҷ•пјҡ${esc(i.ref)}пҪңиіҮж–ҷпјҡ${esc(i.source)}пҪң${esc(i.date||"")}</div>
        </div></div>`;
    }
  }

  html+=`<div class="legend">ең–дҫӢпјҡв—Ҹ з¶ пјқе°ҚйҖІж”»/йўЁйҡӘиіҮз”ўжңүеҲ©пјҲеҗ«гҖҢеӨ§и·ҢпјқиІ·й»һгҖҚзҡ„еҸҚеҗ‘йӮҸијҜпјҢз¶ вү еёӮе ҙеңЁжјІпјүпҪңв—Ҹ и—ҚпјқдёӯжҖ§пҪңв—Ҹ й»ғпјқз•ҷж„ҸпҪңв—Ҹ зҙ…пјқиӯҰжҲ’гҖӮ
  гҖҢйҖұгҖҚпјқиҲҮзҙ„дёҖйҖұеүҚзӣёжҜ”гҖӮиүІеё¶ең–пјқзҸҫеҖјпјҲзҷҪйҮқпјүиҗҪеңЁе“ӘеҖӢй–ҖжӘ»еҚҖгҖӮиҷӣз·ҡпјқJane зҡ„еҲӨж–·й–ҖжӘ»гҖӮй»һеҚЎзүҮеұ•й–ӢеҲӨи®ҖйӮҸијҜиҲҮеҮәиҷ•гҖӮ</div>
  <footer>жң¬е„ҖиЎЁжқҝж•ҙзҗҶиҮӘ JaneпјҲж—әдҫҶе№«пјүж–Үз« дёӯзҡ„и§ҖеҜҹжЎҶжһ¶иҲҮеҲӨи®ҖйӮҸијҜпјҢеғ…дҫӣеҖӢдәәеӯёзҝ’еҸғиҖғпјҢйқһжҠ•иіҮе»әиӯ°гҖӮ
  иіҮж–ҷдҫҶжәҗпјҡFREDгҖҒYahoo FinanceгҖҒECBгҖҒCNNгҖҒCoinGeckoгҖҒmultplгҖҒer-apiгҖӮжҜҸж—ҘиҮӘеӢ•жӣҙж–°пјҲеҸ°еҢ—жҷӮй–“ж—©дёҠпјүгҖӮ</footer>`;
  document.getElementById("app").innerHTML=html;
}

// ---- жүӢеӢ•жӣҙж–°пјҡи§ёзҷј GitHub ActionsпјҲtoken еҸӘеӯҳеңЁжң¬ж©ҹзҖҸиҰҪеҷЁпјү ----
const REPO="peiyichenx-dotcom/jane-econ-dashboard";
let CUR_UPDATED="";
async function manualUpdate(){
  const btn=document.getElementById("refbtn");
  let tok=localStorage.getItem("gh_token");
  if(!tok){
    tok=prompt("з¬¬дёҖж¬ЎдҪҝз”ЁжүӢеӢ•жӣҙж–°пјҢи«ӢиІјдёҠ GitHub TokenпјҲд№ӢеҫҢдёҚз”ЁеҶҚијёе…ҘпјҢеҸӘеӯҳеңЁйҖҷж”ҜжүӢж©ҹзҡ„зҖҸиҰҪеҷЁиЈЎпјүгҖӮ\n\nе»әз«Ӣж–№ејҸпјҡGitHub вҶ’ Settings вҶ’ Developer settings вҶ’ Fine-grained tokens вҶ’ еҸӘеӢҫ jane-econ-dashboard йҖҷеҖӢ repo вҶ’ Permissions жҠҠ Actions иЁӯзӮә Read and write вҶ’ GenerateгҖӮ");
    if(!tok) return;
    localStorage.setItem("gh_token",tok.trim());
    tok=tok.trim();
  }
  btn.disabled=true;btn.classList.add("busy");btn.textContent="вҸі и§ёзҷјдёӯвҖҰ";
  try{
    const r=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/update.yml/dispatches`,{
      method:"POST",
      headers:{Authorization:"Bearer "+tok,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"},
      body:JSON.stringify({ref:"main"})});
    if(r.status===204){
      let n=0;
      btn.textContent="вҸі жӣҙж–°дёӯвҖҰзҙ„1вҖ“2еҲҶйҗҳ";
      const timer=setInterval(async()=>{
        n++;
        try{
          const d2=await (await fetch("data.json?t="+Date.now(),{cache:"no-store"})).json();
          if(d2.updated_utc!==CUR_UPDATED){clearInterval(timer);render(d2);return;}
        }catch(e){}
        if(n>=30){clearInterval(timer);btn.disabled=false;btn.classList.remove("busy");
          btn.textContent="рҹ”„ з«ӢеҚіжӣҙж–°";alert("жӣҙж–°жөҒзЁӢе·Іи§ёзҷјпјҢдҪҶй Ғйқўзӯүи¶…йҒҺ5еҲҶйҗҳжңӘж”¶еҲ°ж–°иіҮж–ҷгҖӮзЁҚеҫҢжүӢеӢ•йҮҚж–°ж•ҙзҗҶеҚіеҸҜпјҢжҲ–еҲ° GitHub Actions жҹҘзңӢеҹ·иЎҢзӢҖж…ӢгҖӮ");}
      },10000);
    }else if(r.status===401||r.status===403){
      localStorage.removeItem("gh_token");
      btn.disabled=false;btn.classList.remove("busy");btn.textContent="рҹ”„ з«ӢеҚіжӣҙж–°";
      alert("Token з„Ўж•ҲжҲ–ж¬ҠйҷҗдёҚи¶іпјҲйңҖиҰҒи©І repo зҡ„ Actions: Read and writeпјүгҖӮе·Іжё…йҷӨпјҢи«ӢеҶҚжҢүдёҖж¬ЎдёҰиІјдёҠж–°зҡ„ tokenгҖӮ");
    }else{
      btn.disabled=false;btn.classList.remove("busy");btn.textContent="рҹ”„ з«ӢеҚіжӣҙж–°";
      alert("и§ёзҷјеӨұж•—пјҲHTTP "+r.status+"пјүпјҢи«ӢзЁҚеҫҢеҶҚи©ҰгҖӮ");
    }
  }catch(e){
    btn.disabled=false;btn.classList.remove("busy");btn.textContent="рҹ”„ з«ӢеҚіжӣҙж–°";
    alert("з¶Іи·ҜйҢҜиӘӨпјҡ"+e);
  }
}

fetch("data.json?t="+Date.now()).then(r=>{
  if(!r.ok) throw new Error(r.status);
  return r.json();
}).then(render).catch(e=>{
  document.getElementById("app").innerHTML=
   `<header><h1>рҹҢҚ з¶“жҝҹеұҖеӢўе„ҖиЎЁжқҝ</h1></header>
    <div class="loading">е°ҡз„ЎиіҮж–ҷгҖӮ<br><br>и«ӢеҲ° GitHub repo зҡ„ Actions й ҒйқўжүӢеӢ•еҹ·иЎҢдёҖж¬ЎгҖҢupdate-dataгҖҚworkflowгҖӮ<br><small style="color:var(--tx3)">(${e})</small></div>`;
});
</script>
